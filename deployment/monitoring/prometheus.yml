global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'soketi-cluster'
    environment: 'production'

scrape_configs:
  # Soketi Rust Server Metrics
  - job_name: 'soketi'
    static_configs:
      - targets: ['soketi:9601']
        labels:
          service: 'soketi-server'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Redis Exporter (if using redis-exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
    scrape_interval: 30s

# Alerting rules
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']
