services:
  # Soketi WebSocket Server
  soketi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soketi-server
    restart: unless-stopped
    ports:
      # Expose soketi ports for direct access (optional)
      - "${SOKETI_WS_PORT:-6001}:6001"  # WebSocket port
      - "${SOKETI_METRICS_PORT:-9601}:9601"  # Metrics port
    volumes:
      # Mount custom config if needed
      - ${SOKETI_CONFIG_PATH:-./config.json}:/app/config.json:ro
    environment:
      # Soketi configuration via environment variables
      - SOKETI_HOST=${SOKETI_HOST:-0.0.0.0}
      - SOKETI_PORT=${SOKETI_PORT:-6001}
      - SOKETI_METRICS_SERVER_PORT=${SOKETI_METRICS_SERVER_PORT:-9601}
      - SOKETI_DEBUG=${SOKETI_DEBUG:-false}
      # App configuration
      - SOKETI_DEFAULT_APP_ID=${SOKETI_DEFAULT_APP_ID:-app-id}
      - SOKETI_DEFAULT_APP_KEY=${SOKETI_DEFAULT_APP_KEY:-app-key}
      - SOKETI_DEFAULT_APP_SECRET=${SOKETI_DEFAULT_APP_SECRET:-app-secret}
      # Enable user authentication
      - SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES=${SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES:-true}
      - SOKETI_DEFAULT_APP_ENABLED=${SOKETI_DEFAULT_APP_ENABLED:-true}
      - SOKETI_DEFAULT_APP_MAX_CONNECTIONS=${SOKETI_DEFAULT_APP_MAX_CONNECTIONS:-1000}
      - SOKETI_DEFAULT_APP_MAX_BACKEND_EVENTS_PER_SEC=${SOKETI_DEFAULT_APP_MAX_BACKEND_EVENTS_PER_SEC:-100}
      - SOKETI_DEFAULT_APP_MAX_CLIENT_EVENTS_PER_SEC=${SOKETI_DEFAULT_APP_MAX_CLIENT_EVENTS_PER_SEC:-100}
      - SOKETI_DEFAULT_APP_MAX_READ_REQ_PER_SEC=${SOKETI_DEFAULT_APP_MAX_READ_REQ_PER_SEC:-100}
    networks:
      - soketi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"        # HTTP
      - "${HTTPS_PORT:-443}:443"     # HTTPS (HTTP/2)
      - "${HTTP3_PORT:-443}:443/udp" # HTTP/3 (QUIC)
    volumes:
      # Mount Nginx configuration files
      - ${NGINX_CONF_PATH:-./nginx.conf}:/etc/nginx/nginx.conf:ro
      - ${NGINX_DEFAULT_CONF_PATH:-./default.conf}:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL/TLS certificates
      - ${SSL_CERT_PATH:-./certs/cert.pem}:/etc/nginx/ssl/cert.pem:ro
      - ${SSL_KEY_PATH:-./certs/key.pem}:/etc/nginx/ssl/key.pem:ro
      # Optional: Mount additional SSL certificates or CA bundle
      # - ${SSL_CA_PATH:-./certs/ca.pem}:/etc/nginx/ssl/ca.pem:ro
      # Persistent storage for Nginx logs
      - nginx_logs:/var/log/nginx
      # Optional: Mount custom error pages
      # - ${NGINX_ERROR_PAGES:-./error-pages}:/usr/share/nginx/html/errors:ro
    environment:
      # Nginx configuration (can be used in config files)
      - NGINX_HOST=${NGINX_HOST:-soketi.example.com}
      - NGINX_PORT=${NGINX_PORT:-80}
    networks:
      - soketi-network
    depends_on:
      soketi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  soketi-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SOKETI_NETWORK_SUBNET:-172.20.0.0/16}

volumes:
  nginx_logs:
    driver: local
