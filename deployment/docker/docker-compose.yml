services:
  # Soketi Rust WebSocket Server
  soketi:
    # image: funal/soketi-rs:latest
    # Uncomment to build locally instead of using Docker Hub image:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: soketi-server
    restart: unless-stopped
    ports:
      - "6001:6001"  # WebSocket port
      - "9601:9601"  # Metrics port
    volumes:
      - ./config.json:/app/config.json:ro
      - soketi-data:/app/data
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      - soketi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # Redis (optional - for clustering)
  redis:
    image: redis:7-alpine
    container_name: soketi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - soketi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Prometheus (optional - for metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: soketi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - soketi-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Grafana (optional - for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: soketi-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - soketi-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  soketi-network:
    driver: bridge

volumes:
  soketi-data:
  redis-data:
  prometheus-data:
  grafana-data:
