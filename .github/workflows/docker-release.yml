name: Docker Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g., v1.0.0)'
        required: true
        type: string

env:
  DOCKER_USERNAME: funal
  IMAGE_NAME: soketi-rs

jobs:
  docker-build:
    name: Build and Push Docker Image (Multi-arch)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:latest
          network=host
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.event.release.tag_name }}"
        fi
        VERSION=${VERSION#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        # Major.minor extraction
        MAJOR_MINOR=$(echo $VERSION | cut -d. -f1-2)
        echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT

        # Major extraction
        MAJOR=$(echo $VERSION | cut -d. -f1)
        echo "major=$MAJOR" >> $GITHUB_OUTPUT

        echo "Building version: $VERSION (major.minor: $MAJOR_MINOR, major: $MAJOR)"
    
    - name: Build and push multi-arch image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./deployment/docker/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
        cache-from: type=gha,scope=buildx-multi-arch
        cache-to: type=gha,mode=max,scope=buildx-multi-arch
        build-args: |
          CARGO_INCREMENTAL=0
          CARGO_NET_RETRY=10
          RUSTFLAGS=-C target-cpu=generic
  
  docker-hub-update:
    name: Update Docker Hub Description
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
        readme-filepath: ./DOCKER_HUB_README.md
