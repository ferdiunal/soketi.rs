name: Docker Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g., v1.0.0)'
        required: true
        type: string

env:
  DOCKER_USERNAME: funal
  IMAGE_NAME: soketi-rs

jobs:
  docker-amd64:
    name: Build and Push Docker Image (AMD64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:latest
          network=host
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.event.release.tag_name }}"
        fi
        VERSION=${VERSION#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    
    - name: Build and push AMD64 image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./deployment/docker/Dockerfile
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-amd64
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest-amd64
        cache-from: type=gha,scope=amd64
        cache-to: type=gha,mode=max,scope=amd64
        platforms: linux/amd64
        build-args: |
          CARGO_INCREMENTAL=0
          CARGO_NET_RETRY=10
          RUSTFLAGS=-C target-cpu=generic
  
  docker-manifest:
    name: Create Multi-arch Manifest
    needs: docker-amd64
    runs-on: ubuntu-latest
    
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.event.release.tag_name }}"
        fi
        VERSION=${VERSION#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create and push manifest
      run: |
        VERSION=${{ steps.version.outputs.version }}
        
        # Create version manifest
        docker buildx imagetools create -t ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION} \
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64
        
        # Create latest manifest
        docker buildx imagetools create -t ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest-amd64
        
        # Create major.minor tag
        MAJOR_MINOR=$(echo $VERSION | cut -d. -f1-2)
        docker buildx imagetools create -t ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${MAJOR_MINOR} \
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64
        
        # Create major tag
        MAJOR=$(echo $VERSION | cut -d. -f1)
        docker buildx imagetools create -t ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${MAJOR} \
          ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64
    
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
        repository: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
        readme-filepath: ./DOCKER_HUB_README.md
